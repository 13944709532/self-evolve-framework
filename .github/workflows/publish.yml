name: publish

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write # 关键：允许 GitHub OIDC 为 npm 签发临时发布令牌

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm publish --provenance
